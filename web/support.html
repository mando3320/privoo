<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدعم الفني - Privoo</title>
  <link rel="icon" href="img/app_icon.jpeg" />
  <link rel="stylesheet" href="style_privoo_landing.css" />
  <style>
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #101a2b;
      padding: 32px;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; color: #00c3ff; font-weight: bold; }
    input, textarea {
      width: 100%;
      padding: 14px;
      background: #1e2a3a;
      border: 1px solid #2a3a4a;
      border-radius: 16px;
      color: #eaf6ff;
      font-family: inherit;
      font-size: 1em;
      transition: all 0.3s;
    }
    input:focus, textarea:focus { border-color: #00c3ff; outline: none; box-shadow: 0 0 0 3px rgba(0,195,255,0.2); }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #0066ff, #ff4d00);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(255,77,0,0.3); }
    .success-message { background: rgba(46,204,113,0.15); border: 1px solid #2ecc71; border-radius: 12px; padding: 12px; margin-top: 16px; text-align: center; color: #2ecc71; }
    .error-message { background: rgba(231,76,60,0.15); border: 1px solid #e74c3c; border-radius: 12px; padding: 12px; margin-top: 16px; text-align: center; color: #e74c3c; }
    .auto-info { background: rgba(0,195,255,0.1); border-radius: 12px; padding: 10px; margin-bottom: 20px; font-size: 0.8em; text-align: center; color: #8bbcff; }
    .logo-container { text-align: center; margin-bottom: 20px; }
    .logo-image { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 0 3px rgba(0,195,255,0.3), 0 10px 30px rgba(0,0,0,0.3); transition: all 0.3s; }
    .logo-image:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="img/app_icon.jpeg" alt="Privoo Logo" class="logo-image" />
    </div>
    <h1>🛠️ الدعم الفني</h1>
    <p style="text-align: center; margin-bottom: 32px;">نحن هنا لمساعدتك على مدار الساعة</p>

    <div class="auto-info" id="autoInfoSummary">🖥️ جاري التعرف على جهازك...</div>

    <div class="form-group">
      <label>👤 اسمك</label>
      <input type="text" id="userName" placeholder="أدخل اسمك الكامل">
    </div>

    <div class="form-group">
      <label>💬 رسالتك</label>
      <textarea id="userMessage" rows="5" placeholder="اكتب مشكلتك أو استفسارك بالتفصيل..."></textarea>
    </div>

    <button id="sendBtn">📨 إرسال الرسالة</button>
    <button id="resetForm" style="display: none; margin-top: 12px;">✉️ إرسال رسالة جديدة</button>
    <div id="statusMsg"></div>

    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid #2a3a4a; text-align: center;">
      <a href="index_privoo_landing.html" class="store-link" style="display: inline-block;">⬅️ العودة للصفحة الرئيسية</a>
    </div>
  </div>

  <script>
    async function getFingerprint() {
      const components = [navigator.userAgent, navigator.language, screen.colorDepth, screen.width + "x" + screen.height, new Date().getTimezoneOffset(), !!navigator.hardwareConcurrency, !!navigator.maxTouchPoints];
      const str = components.join("|");
      const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join("");
    }
    async function getIP() {
      try { const res = await fetch('https://api.ipify.org?format=json'); const data = await res.json(); return data.ip; } catch(e) { return "unknown"; }
    }
    async function getAutoInfo() {
      return { fingerprint: await getFingerprint(), ip: await getIP(), userAgent: navigator.userAgent, language: navigator.language, screenResolution: `${screen.width}x${screen.height}`, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, timestamp: new Date().toISOString() };
    }
    let autoInfo = null;
    getAutoInfo().then(info => { autoInfo = info; document.getElementById("autoInfoSummary").innerHTML = `🖥️ تم التعرف على جهازك | IP: ${info.ip} | المتصفح: ${info.userAgent.substring(0, 50)}...`; });

    const nameInput = document.getElementById("userName"), messageInput = document.getElementById("userMessage"), statusDiv = document.getElementById("statusMsg"), sendBtn = document.getElementById("sendBtn"), resetBtn = document.getElementById("resetForm");
    function showMessage(text, isError = false) { statusDiv.innerHTML = `<div class="${isError ? 'error-message' : 'success-message'}">${text}</div>`; setTimeout(() => statusDiv.innerHTML = "", 5000); }
    window.sendSupport = async function() {
      const name = nameInput.value.trim(), message = messageInput.value.trim();
      if (!name || !message) { showMessage("❌ يرجى إدخال الاسم والرسالة", true); return; }
      sendBtn.disabled = true; sendBtn.textContent = "⏳ جاري الإرسال...";
      try {
        const messageId = Date.now() + "_" + Math.random().toString(36).substr(2, 9);
        const response = await fetch(`https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/support_messages/${messageId}.json`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: messageId, name, message, time: new Date().toISOString(), reply: null, source: "web", auto: autoInfo || await getAutoInfo() }) });
        if (response.ok) { nameInput.value = ""; messageInput.value = ""; showMessage("✅ تم إرسال رسالتك بنجاح! سنرد عليك خلال 24 ساعة."); sendBtn.style.display = "none"; resetBtn.style.display = "block"; }
        else throw new Error("فشل الإرسال - " + response.status);
      } catch (error) { console.error(error); showMessage("❌ حدث خطأ أثناء الإرسال: " + error.message, true); }
      finally { sendBtn.disabled = false; sendBtn.textContent = "📨 إرسال الرسالة"; }
    };
    window.resetSupportForm = function() { nameInput.value = ""; messageInput.value = ""; sendBtn.style.display = "block"; resetBtn.style.display = "none"; };
    sendBtn.onclick = () => sendSupport(); resetBtn.onclick = () => resetSupportForm();
  </script>
</body>
</html>
