<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم الإدارة - Privoo</title>
  <link rel="stylesheet" href="../style_privoo_landing.css" />
  <style>
    * { box-sizing: border-box; }
    body { background: #0a1020; color: #eaf6ff; font-family: 'Cairo', sans-serif; padding: 24px; }
    .dashboard-container { max-width: 1200px; margin: 0 auto; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 30px; }
    h1 { color: #00c3ff; margin: 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #101a2b; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(0,195,255,0.15); }
    .stat-value { font-size: 2.5em; font-weight: bold; color: #00c3ff; }
    .actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .action-card { background: #101a2b; border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; border: 1px solid rgba(0,195,255,0.15); text-decoration: none; color: inherit; display: block; }
    .action-card:hover { border-color: #00c3ff; transform: translateY(-3px); }
    .log-section { background: #101a2b; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
    .log-content { background: #0a1020; border-radius: 16px; padding: 16px; font-family: monospace; font-size: 0.85em; max-height: 200px; overflow-y: auto; }
    .generate-btn { background: linear-gradient(90deg, #0066ff, #00c3ff); border: none; border-radius: 40px; padding: 12px 28px; color: white; cursor: pointer; }
    .post-output { background: #0a1020; border-radius: 16px; padding: 16px; margin-top: 16px; white-space: pre-wrap; }
    @media (max-width: 700px) { body { padding: 16px; } }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <div><h1>📊 Privoo Dashboard</h1></div>
      <div class="connection-status">🟢 متصل</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="visitorsCount">0</div><div class="stat-label">👥 زوار</div></div>
      <div class="stat-card"><div class="stat-value" id="downloadsCount">0</div><div class="stat-label">📦 تحميلات</div></div>
      <div class="stat-card"><div class="stat-value" id="messagesCount">0</div><div class="stat-label">📨 رسائل الدعم</div></div>
    </div>

    <div class="actions-grid">
      <a href="support_admin.html" class="action-card"><div class="action-icon">📨</div><div>إدارة رسائل الدعم</div></a>
      <div onclick="window.location.href='../index_privoo_landing.html'" class="action-card"><div>🏠</div><div>الصفحة الرئيسية</div></div>
    </div>

    <div class="log-section">
      <h3>📝 سجل الأحداث</h3>
      <div class="log-content" id="logContent">جارٍ التحميل...</div>
    </div>

    <div class="log-section">
      <h3>📢 منشور تسويقي تلقائي</h3>
      <button class="generate-btn" id="generatePostBtn">🎯 توليد منشور جديد</button>
      <div class="post-output" id="postOutput"></div>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        // ✅ إضافة مؤقت وحماية من الأخطاء
        const timeoutPromise = new Promise((_, reject) => 
          setTimeout(() => reject(new Error('Timeout')), 5000)
        );
        
        const fetchPromise = Promise.all([
          fetch('https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/visitors.json').catch(() => null),
          fetch('https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/downloads.json').catch(() => null),
          fetch('https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/support_messages.json').catch(() => null)
        ]);
        
        const results = await Promise.race([fetchPromise, timeoutPromise]);
        
        // visitors
        if (results[0]) {
          const visitors = await results[0].json();
          document.getElementById('visitorsCount').innerText = visitors?.count || 0;
        } else {
          document.getElementById('visitorsCount').innerText = '0';
        }
        
        // downloads
        if (results[1]) {
          const downloads = await results[1].json();
          document.getElementById('downloadsCount').innerText = downloads?.count || 0;
        } else {
          document.getElementById('downloadsCount').innerText = '0';
        }
        
        // messages
        if (results[2]) {
          const messages = await results[2].json();
          const msgCount = messages ? Object.keys(messages).length : 0;
          document.getElementById('messagesCount').innerText = msgCount;
        } else {
          document.getElementById('messagesCount').innerText = '0';
        }
        
      } catch(e) {
        console.error('خطأ في تحميل الإحصائيات:', e);
        // ✅ عرض 0 بدلاً من "اعدادات"
        document.getElementById('visitorsCount').innerText = '0';
        document.getElementById('downloadsCount').innerText = '0';
        document.getElementById('messagesCount').innerText = '0';
      }
    }

    async function loadLog() {
      try {
        const res = await fetch('https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/log.json');
        if (!res.ok) throw new Error('فشل التحميل');
        const data = await res.json();
        let output = "";
        if (data && typeof data === 'object') {
          Object.entries(data).reverse().slice(0, 15).forEach(([key, val]) => { 
            output += `• ${val}\n`; 
          });
        }
        document.getElementById("logContent").innerText = output || "لا يوجد سجل بعد.";
      } catch(e) { 
        document.getElementById("logContent").innerText = "⚠️ لا يوجد سجل"; 
      }
    }

    const intros = ["🔒 هل تبحث عن تطبيق يحترم خصوصيتك؟", "🚀 لكل من يرفض التتبع الرقمي", "💬 تواصل بحرية، بدون وسطاء"];
    const features = ["🔐 تشفير من طرف إلى طرف", "🚫 لا يستخدم خدمات خارجية", "🛡️ لا يجمع بياناتك", "🤖 ذكاء اصطناعي مدمج (Gemini AI)"];
    const cta = "⬇️ حمل Privoo الآن: https://privoo-b1c4b.web.app";
    
    function generatePost() {
      const intro = intros[Math.floor(Math.random() * intros.length)];
      const shuffled = [...features];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return `${intro}\n\n${shuffled.slice(0, 3).join("\n")}\n\n${cta}`;
    }

    document.getElementById("generatePostBtn").addEventListener("click", () => {
      document.getElementById("postOutput").innerText = generatePost();
    });

    loadStats();
    loadLog();
    setInterval(loadStats, 30000);
    document.getElementById("postOutput").innerText = generatePost();
    
    // ✅ إضافة مؤشر للاتصال
    console.log('✅ Dashboard loaded - Stats will show 0 if no data');
  </script>
</body>
</html>
