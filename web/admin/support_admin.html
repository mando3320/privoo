<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم الدعم المتقدمة - Privoo</title>
  <link rel="stylesheet" href="../style_privoo_landing.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0a1020;
      color: #eaf6ff;
      font-family: 'Cairo', sans-serif;
      padding: 24px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      gap: 16px;
    }

    h1 {
      color: #00c3ff;
      margin: 0;
      font-size: 1.8em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #101a2b;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 1px solid rgba(0, 195, 255, 0.2);
    }

    .stat-value {
      font-size: 2.2em;
      font-weight: bold;
      color: #00c3ff;
    }

    .filter-bar {
      background: #101a2b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .filter-bar input, .filter-bar select {
      background: #1e2a3a;
      border: 1px solid #2a3a4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #eaf6ff;
      font-family: inherit;
    }

    .filter-bar button {
      background: linear-gradient(90deg, #0066ff, #00c3ff);
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .bulk-bar {
      background: #101a2b;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .bulk-bar button.danger {
      background: #a12222;
    }

    .msg-box {
      background: #101a2b;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      border-left: 4px solid #00c3ff;
    }

    .msg-box.selected {
      border-left-color: #ff4d00;
      background: #162235;
    }

    .msg-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .msg-name {
      font-weight: bold;
      color: #00c3ff;
    }

    .reply-section {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .reply-input {
      flex: 1;
      background: #1e2a3a;
      border: 1px solid #2a3a4a;
      border-radius: 40px;
      padding: 12px 16px;
      color: #eaf6ff;
    }

    .btn-reply {
      background: linear-gradient(90deg, #0066ff, #00c3ff);
      border: none;
      border-radius: 40px;
      padding: 10px 22px;
      color: white;
      cursor: pointer;
    }

    .auto-details {
      font-size: 0.75em;
      color: #8bbcff;
      margin-top: 8px;
      padding: 6px;
      background: #0a1020;
      border-radius: 8px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
    }

    .pagination button {
      background: #1e2a3a;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      cursor: pointer;
    }

    .pagination button.active {
      background: #00c3ff;
    }

    @media (max-width: 700px) {
      body { padding: 16px; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .reply-section { flex-direction: column; }
      .bulk-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <!-- ✅ استخدام isAdminLoggedIn من firebase.js -->
  <script type="module">
    import { isAdminLoggedIn } from './firebase.js';
    
    if (!isAdminLoggedIn()) {
      alert("🚫 الوصول مرفوض. يجب تسجيل الدخول أولاً.");
      window.location.href = "login.html";
    }
  </script>

  <div class="dashboard-header">
    <div><h1>📨 لوحة تحكم الدعم المتقدمة</h1></div>
    <div class="connection-status" id="connStatus">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">متصل</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="totalMsgs">0</div><div class="stat-label">إجمالي الرسائل</div></div>
    <div class="stat-card"><div class="stat-value" id="repliedMsgs">0</div><div class="stat-label">تم الرد عليها</div></div>
    <div class="stat-card"><div class="stat-value" id="pendingMsgs">0</div><div class="stat-label">قيد الانتظار</div></div>
    <div class="stat-card"><div class="stat-value" id="webMsgs">0</div><div class="stat-label">من الموقع</div></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو الرسالة" style="flex:2;">
    <select id="filterSource">
      <option value="all">الكل</option>
      <option value="app">التطبيق فقط</option>
      <option value="web">الموقع فقط</option>
    </select>
    <button id="applyFilterBtn">تطبيق الفلتر</button>
    <button id="resetFilterBtn">إعادة تعيين</button>
  </div>

  <div class="bulk-bar">
    <div><span id="selectedCount">0</span> رسالة محددة</div>
    <div><button id="bulkDeleteBtn" class="danger">🗑️ حذف المحدد</button></div>
  </div>

  <div id="messagesList"></div>
  <div class="pagination" id="pagination"></div>

  <a href="dashboard.html" class="back-link">⬅️ العودة للوحة التحكم الرئيسية</a>

  <script>
    let allMessages = [];
    let filteredMessages = [];
    let currentPage = 1;
    let selectedMessages = new Set();
    const pageSize = 10;

    const container = document.getElementById("messagesList");
    const searchInput = document.getElementById("searchInput");
    const filterSource = document.getElementById("filterSource");
    const totalMsgsEl = document.getElementById("totalMsgs");
    const repliedMsgsEl = document.getElementById("repliedMsgs");
    const pendingMsgsEl = document.getElementById("pendingMsgs");
    const webMsgsEl = document.getElementById("webMsgs");
    const selectedCountSpan = document.getElementById("selectedCount");

    async function loadMessages() {
      try {
        const response = await fetch('https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/support_messages.json');
        const data = await response.json();
        
        allMessages = [];
        if (data) {
          allMessages = Object.entries(data).map(([id, val]) => ({ id, ...val }));
          allMessages.sort((a, b) => new Date(b.time) - new Date(a.time));
        }
        
        updateStats();
        applyFilters();
      } catch(e) {
        console.error(e);
        container.innerHTML = "<p style='text-align:center;'>⚠️ فشل تحميل الرسائل</p>";
      }
    }

    function updateStats() {
      totalMsgsEl.innerText = allMessages.length;
      const replied = allMessages.filter(m => m.reply && m.reply.trim() !== "").length;
      repliedMsgsEl.innerText = replied;
      pendingMsgsEl.innerText = allMessages.length - replied;
      const webCount = allMessages.filter(m => m.source === "web").length;
      webMsgsEl.innerText = webCount;
    }

    function applyFilters() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const sourceFilter = filterSource.value;
      
      filteredMessages = allMessages.filter(msg => {
        if (searchTerm && !(msg.name?.toLowerCase().includes(searchTerm) || msg.message?.toLowerCase().includes(searchTerm))) return false;
        if (sourceFilter === "app" && msg.source !== "app") return false;
        if (sourceFilter === "web" && msg.source !== "web") return false;
        return true;
      });
      
      currentPage = 1;
      selectedMessages.clear();
      renderMessages();
    }

    function renderMessages() {
      const start = (currentPage - 1) * pageSize;
      const paginated = filteredMessages.slice(start, start + pageSize);
      container.innerHTML = "";
      
      if (paginated.length === 0) {
        container.innerHTML = "<p style='text-align:center;padding:40px;'>لا توجد رسائل مطابقة</p>";
        return;
      }
      
      paginated.forEach(msg => {
        const isSelected = selectedMessages.has(msg.id);
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg-box ${isSelected ? 'selected' : ''}`;
        
        let autoHtml = "";
        if (msg.auto) {
          autoHtml = `<div class="auto-details">🖥️ IP: ${msg.auto.ip || 'غير معروف'} | الجهاز: ${msg.auto.userAgent?.substring(0, 50) || 'غير معروف'}...</div>`;
        }
        
        msgDiv.innerHTML = `
          <div class="msg-header">
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" class="select-checkbox" data-id="${msg.id}" ${isSelected ? 'checked' : ''}>
              <span class="msg-name">👤 ${escapeHtml(msg.name || "مجهول")}</span>
              ${msg.source === 'app' ? '<span style="background:#0066ff; padding:2px 8px; border-radius:20px; font-size:0.7em;">التطبيق</span>' : '<span style="background:#ff4d00; padding:2px 8px; border-radius:20px; font-size:0.7em;">الموقع</span>'}
            </div>
            <span class="msg-time">📅 ${msg.time || "وقت غير معروف"}</span>
          </div>
          <div class="msg-content">💬 ${escapeHtml(msg.message || "")}</div>
          ${autoHtml}
          <div class="reply-section">
            <input type="text" class="reply-input" id="reply-${msg.id}" placeholder="اكتب ردك هنا..." value="${escapeHtml(msg.reply || "")}">
            <button class="btn-reply" data-id="${msg.id}">إرسال الرد</button>
          </div>
          <div class="current-reply" id="current-reply-${msg.id}">
            📢 الرد الحالي: ${msg.reply ? escapeHtml(msg.reply) : "لا يوجد رد بعد"}
          </div>
        `;
        
        container.appendChild(msgDiv);
        
        const checkbox = msgDiv.querySelector(`.select-checkbox`);
        checkbox.addEventListener("change", (e) => {
          if (e.target.checked) selectedMessages.add(msg.id);
          else selectedMessages.delete(msg.id);
          updateSelectedCount();
        });
        
        const replyBtn = msgDiv.querySelector(`.btn-reply`);
        replyBtn.addEventListener("click", async () => {
          const inputReply = msgDiv.querySelector(`.reply-input`);
          const newReply = inputReply.value.trim();
          if (!newReply) return alert("يرجى كتابة رد أولاً");
          
          await fetch(`https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/support_messages/${msg.id}.json`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reply: newReply })
          });
          
          msg.reply = newReply;
          document.getElementById(`current-reply-${msg.id}`).innerHTML = `📢 الرد الحالي: ${escapeHtml(newReply)}`;
          alert("✅ تم حفظ الرد");
          updateStats();
        });
      });
      
      updateSelectedCount();
      updatePagination();
    }

    function updateSelectedCount() {
      selectedCountSpan.innerText = selectedMessages.size;
    }

    function updatePagination() {
      const totalPages = Math.ceil(filteredMessages.length / pageSize);
      const paginationEl = document.getElementById("pagination");
      paginationEl.innerHTML = "";
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => { currentPage = i; renderMessages(); };
        paginationEl.appendChild(btn);
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    document.getElementById("applyFilterBtn").addEventListener("click", applyFilters);
    document.getElementById("resetFilterBtn").addEventListener("click", () => {
      searchInput.value = "";
      filterSource.value = "all";
      applyFilters();
    });
    
    document.getElementById("bulkDeleteBtn").addEventListener("click", async () => {
      if (!confirm(`⚠️ حذف ${selectedMessages.size} رسالة؟`)) return;
      for (const id of selectedMessages) {
        await fetch(`https://privoo-b1c4b-default-rtdb.europe-west1.firebasedatabase.app/support_messages/${id}.json`, {
          method: 'DELETE'
        });
      }
      selectedMessages.clear();
      loadMessages();
    });

    loadMessages();
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
