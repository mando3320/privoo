<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شكرًا لاستخدام Privoo</title>
  <link rel="icon" href="img/app_icon.jpeg" />
  <link rel="stylesheet" href="style_privoo_landing.css" />
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 60% 20%, #00c3ff 0%, #0a1020 100%);
      color: #eaf6ff;
      margin: 0;
      padding: 0;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background-color: #101a2b;
      padding: 40px 24px;
      border-radius: 18px;
      box-shadow: 0 4px 32px #00336644;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #00c3ff;
      font-size: 2em;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.1em;
      color: #eaf6ff;
      margin-top: 16px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 24px;
      background: linear-gradient(90deg, #0066ff, #ff4d00);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    a:hover {
      background: linear-gradient(90deg, #ff4d00, #0066ff);
    }

    @media (max-width: 600px) {
      .container {
        padding: 32px 16px;
      }

      h1 {
        font-size: 1.6em;
      }

      p {
        font-size: 1em;
      }

      a {
        font-size: 0.95em;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 شكرًا لتحميل Privoo!</h1>
    <p>نتمنى لك تجربة مميزة وخاصة مع التطبيق.<br>خصوصيتك أولويتنا، وتحكمك الكامل هو الأساس.</p>
    <a href="index_privoo_landing.html">⬅️ العودة إلى الصفحة الرئيسية</a>
  </div>
</body>
</html>
