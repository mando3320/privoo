<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جاري التحميل - Privoo</title>
  <link rel="icon" href="img/app_icon.jpeg" />
  <link rel="stylesheet" href="style_privoo_landing.css" />
  <style>
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #101a2b;
      padding: 32px 24px;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .spinner {
      width: 70px;
      height: 70px;
      border: 6px solid rgba(0, 195, 255, 0.2);
      border-top-color: #00c3ff;
      border-right-color: #ff4d00;
      border-radius: 50%;
      margin: 30px auto;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar { width: 80%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px auto; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0066ff, #ff4d00); border-radius: 10px; animation: fill 2s ease-out forwards; }
    @keyframes fill { 0% { width: 0%; } 100% { width: 100%; } }
    .download-btn { display: inline-block; margin: 20px auto; padding: 14px 32px; background: linear-gradient(90deg, #0066ff, #ff4d00); border-radius: 40px; color: white; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: all 0.3s; cursor: pointer; border: none; }
    .download-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(255,77,0,0.3); }
    .store-link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 30px; color: #8bbcff; text-decoration: none; }
    .logo-container { text-align: center; margin-bottom: 20px; }
    .logo-image { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 0 3px rgba(0,195,255,0.3), 0 10px 30px rgba(0,0,0,0.3); transition: all 0.3s; }
    .error-notice { background: rgba(255,77,0,0.15); border: 1px solid #ff4d00; border-radius: 12px; padding: 16px; margin-top: 16px; color: #ffaa88; }
    .error-notice a { color: #00c3ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="img/app_icon.jpeg" alt="Privoo Logo" class="logo-image" />
    </div>
    <h1>📦 جاري تجهيز التحميل</h1>

    <div id="loadingSection">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <p>⏳ جاري التحضير... يرجى الانتظار</p>
    </div>

    <div id="downloadSection" style="display: none;">
      <p style="font-size: 1.2em;">✅ التحميل جاهز!</p>
      <div class="download-btn" id="downloadBtn">📦 تحميل APK (الإصدار 1.0.0)</div>
      <p style="font-size: 0.85em; margin-top: 16px;">🔒 الملف آمن ومشفر | 📱 ~45 ميجابايت</p>
    </div>

    <div id="errorSection" style="display: none;">
      <div class="error-notice">
        <p>⚠️ ملف التحميل غير متوفر حالياً</p>
        <p>سيتم توفير رابط التحميل قريباً.</p>
        <p><a href="index_privoo_landing.html">⬅️ العودة للصفحة الرئيسية</a></p>
      </div>
    </div>

    <a href="index_privoo_landing.html" class="store-link">⬅️ العودة للصفحة الرئيسية</a>
  </div>

  <script>
    const APK_URL = "https://privoo-b1c4b.web.app/apk/privoo.apk";

    function checkFileExists(url, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('HEAD', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          callback(xhr.status === 200);
        }
      };
      xhr.onerror = function() {
        callback(false);
      };
      xhr.send();
    }

    setTimeout(function() {
      document.getElementById("loadingSection").style.display = "none";
      
      checkFileExists(APK_URL, function(exists) {
        if (exists) {
          document.getElementById("downloadSection").style.display = "block";
          document.getElementById("downloadBtn").onclick = function() {
            window.location.href = APK_URL;
          };
        } else {
          document.getElementById("errorSection").style.display = "block";
        }
      });
    }, 2500);
  </script>
</body>
</html>
