<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الصفحة غير موجودة - Privoo</title>
  <link rel="icon" href="/img/app_icon.jpeg" />
  <link rel="stylesheet" href="/style_privoo_landing.css" />
  <style>
    .error-container {
      text-align: center;
      padding: 80px 20px;
    }
    .error-code {
      font-size: 6em;
      color: #ff4d00;
      margin: 0;
      text-shadow: 0 0 20px rgba(255, 77, 0, 0.3);
    }
    .error-message {
      font-size: 1.5em;
      margin: 20px 0;
      color: #eaf6ff;
    }
    .error-description {
      color: #8bbcff;
      margin-bottom: 30px;
    }
    .btn-home {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 28px;
      background: linear-gradient(90deg, #0066ff, #00c3ff);
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn-home:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
    }
    .logo-image {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 0 3px rgba(0, 195, 255, 0.3), 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
    }
    .logo-image:hover {
      transform: scale(1.05);
    }
    .countdown {
      margin-top: 30px;
      font-size: 0.9em;
      color: #6a8aaa;
    }
  </style>
</head>
<body>
  <div class="container error-container">
    <img src="/img/app_icon.jpeg" alt="Privoo Logo" class="logo-image" />
    <h1 class="error-code">404</h1>
    <p class="error-message">عذراً، الصفحة التي تبحث عنها غير موجودة</p>
    <p class="error-description">قد يكون الرابط معطلاً أو تم حذف الصفحة أو أن الملف غير متوفر حالياً.</p>
    <a href="/index_privoo_landing.html" class="btn-home">🏠 العودة للصفحة الرئيسية</a>
    <div class="countdown" id="countdown">سيتم تحويلك خلال 5 ثوانٍ...</div>
  </div>

  <script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    const interval = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = '/index_privoo_landing.html';
      } else {
        countdownEl.textContent = `سيتم تحويلك خلال ${seconds} ثوانٍ...`;
      }
    }, 1000);
  </script>
</body>
</html>
