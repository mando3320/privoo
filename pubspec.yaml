name: privoo
description: Privoo تطبيق دردشة ذكي و امن
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🧱 الأساسيات
  flutter_local_notifications: ^17.2.4
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # 🌐 الشبكات
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  flutter_dotenv: ^5.1.0

  # 🆕 Supabase (بدلاً من Firebase)
  supabase_flutter: ^2.5.0
  uuid: ^4.5.1

  # ❌ إزالة Firebase
  # firebase_core: ^3.15.2
  # firebase_auth: ^5.7.0
  # cloud_firestore: ^5.6.12
  # firebase_messaging: ^15.1.0
  # cloud_functions: ^5.1.0
  # firebase_performance: ^0.10.0+1
  # firebase_storage: ^12.3.0
  # firebase_database: ^11.3.10

  # 💾 التخزين
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0
  path_provider: ^2.1.0
  hive_flutter: ^1.1.0

  # 📱 معلومات الجهاز
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0

  # 🔊 الصوت والفيديو
  just_audio: ^0.9.36
  flutter_sound: ^9.2.0
  video_player: ^2.8.0
  flutter_webrtc: ^1.1.0
  flutter_tts: ^3.8.5
  record: ^6.2.0

  # 📷 الصور والكاميرا
  image_picker: ^1.1.0
  camera: ^0.10.5
  file_picker: ^8.1.0
  image: ^4.2.0
  cached_network_image: ^3.3.1

  # 🔐 الأمان والتشفير
  encrypt: ^5.0.3
  cryptography: ^2.7.0
  crypto: ^3.0.3
  local_auth: ^2.1.6

  # 🧠 التحكم والحالة
  flutter_riverpod: ^2.5.1
  synchronized: ^3.1.0
  logger: ^2.3.0

  # 📱 الأذونات
  permission_handler: ^11.3.0
  url_launcher: ^6.3.0
  geolocator: ^14.0.2
  flutter_contacts: ^1.1.9+2

  # 🔐 المصادقات الاجتماعية
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # 🤖 الذكاء الاصطناعي
  google_generative_ai: ^0.4.6

  # 🎨 واجهات
  flutter_native_splash: ^2.4.0
  fluttertoast: ^8.2.5
  flutter_html: ^3.0.0-beta.2

  # 📦 عامة
  path: any
  collection: any
  html: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.0
  flutter_driver:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpeg"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/app_icon.jpeg
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/privoo_intro.jpeg
    - assets/images/app_icon.jpeg
    - assets/images/bot.png
    - assets/images/light_mode/
    - assets/images/dark_mode/
    - assets/fonts/
    - assets/audio/
    - web/
    - web/index_privoo_landing.html
    - web/img/bot.png
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf