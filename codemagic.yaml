workflows:
  # 1️⃣ Web Build
  web-workflow:
    name: Web Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.29.0
    scripts:
      - name: Generate Localizations
        script: |
          flutter gen-l10n
          
      - name: Build Web
        script: |
          flutter clean
          flutter pub get
          flutter gen-l10n
          flutter build web --release
          
          echo "========================================="
          echo "🔍 Web build completed"
          echo "========================================="
          
          mkdir -p build/web
    artifacts:
      - build/web/**

  # 2️⃣ Release APK
  release-workflow:
    name: Release APK
    instance_type: mac_mini_m2
    environment:
      flutter: 3.29.0
    scripts:
      - name: Generate Localizations
        script: |
          flutter gen-l10n
          
      - name: Build Release APK
        script: |
          flutter clean
          flutter pub get
          flutter gen-l10n
          flutter build apk --release
          
          echo "========================================="
          echo "🔍 Searching for APK files..."
          echo "========================================="
          find . -name "*.apk" -type f 2>/dev/null
          
          mkdir -p build/app/outputs/flutter-apk/
          find . -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/ \;
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  # 3️⃣ Debug APK
  debug-workflow:
    name: Debug APK
    instance_type: mac_mini_m2
    environment:
      flutter: 3.29.0
    scripts:
      - name: Generate Localizations
        script: |
          flutter gen-l10n
          
      - name: Build Debug APK
        script: |
          flutter clean
          flutter pub get
          flutter gen-l10n
          flutter build apk --debug
          
          echo "========================================="
          echo "🔍 Searching for Debug APK files..."
          echo "========================================="
          find . -name "*.apk" -type f 2>/dev/null
          
          mkdir -p build/app/outputs/flutter-apk/
          find . -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/ \;
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  # 4️⃣ All builds
  all-workflow:
    name: All Builds (APK + Web)
    instance_type: mac_mini_m2
    environment:
      flutter: 3.29.0
    scripts:
      - name: Generate Localizations
        script: |
          flutter gen-l10n
          
      - name: Build Release APK
        script: |
          flutter clean
          flutter pub get
          flutter gen-l10n
          flutter build apk --release
          
      - name: Build Debug APK
        script: |
          flutter gen-l10n
          flutter build apk --debug
          
      - name: Build Web
        script: |
          flutter gen-l10n
          flutter build web --release
          
      - name: Collect all artifacts
        script: |
          echo "========================================="
          echo "📦 Collecting all artifacts..."
          echo "========================================="
          
          mkdir -p build/outputs
          
          find . -name "*.apk" -exec cp {} build/outputs/ \;
          cp -r build/web build/outputs/web
          
          echo "✅ All builds completed"
          
    artifacts:
      - build/outputs/*.apk
      - build/outputs/web/**
